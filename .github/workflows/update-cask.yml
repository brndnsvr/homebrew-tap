name: Update VoxWzrd cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update cask
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256 }}
          URL: ${{ github.event.client_payload.url }}
        run: |
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Casks/voxwzrd.rb
          sed -i "s|sha256 .*|sha256 \"${SHA256}\"|" Casks/voxwzrd.rb
          echo "Updated cask to v${VERSION}"
          cat Casks/voxwzrd.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/voxwzrd.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update VoxWzrd cask to v${VERSION}"
          git push
